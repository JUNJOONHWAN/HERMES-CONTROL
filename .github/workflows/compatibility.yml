name: compatibility

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-and-materialize:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e '.[test]'
      - run: pytest -m 'not integration'
      - run: hermes-control --root "$RUNNER_TEMP/hermes-control" install --no-deps
      - run: hermes-control --root "$RUNNER_TEMP/hermes-control" doctor

  full-runtime-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: hermes-control --root "$RUNNER_TEMP/hermes-control" install
      - run: hermes-control --root "$RUNNER_TEMP/hermes-control" doctor
      - run: mkdir -p "$RUNNER_TEMP/hermes-state" && touch "$RUNNER_TEMP/hermes-state/config.yaml"
      - run: hermes-control --root "$RUNNER_TEMP/hermes-control" setup --hermes-home "$RUNNER_TEMP/hermes-state" --dry-run

  overlay-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: hermes-control --root "$RUNNER_TEMP/hermes-control" install
      - name: Install materialized test dependencies
        run: |
          "$RUNNER_TEMP/hermes-control/current/venv/bin/python" \
            -m pip install -e \
              "$RUNNER_TEMP/hermes-control/current/source[dev,acp,messaging,wecom]"
      - name: Expose managed virtualenv to the canonical upstream test runner
        run: |
          ln -s "$RUNNER_TEMP/hermes-control/current/venv" \
            "$RUNNER_TEMP/hermes-control/current/source/.venv"
      - name: Focused HERMES-CONTROL regression
        working-directory: ${{ runner.temp }}/hermes-control/current/source
        run: |
          ./scripts/run_tests.sh -j 4 \
            tests/agent/test_response_language.py \
            tests/agent/test_supervisor_codex_bridge.py \
            tests/agent/test_supervisor_contract.py \
            tests/hermes_cli/test_artifact_health.py \
            tests/hermes_cli/test_external_cli_adapter.py \
            tests/hermes_cli/test_market_role_contract.py \
            tests/hermes_cli/test_opencode_free_router.py \
            tests/hermes_cli/test_project_card_controller.py \
            tests/hermes_cli/test_project_card_web_api.py \
            tests/hermes_cli/test_public_edition.py \
            tests/hermes_cli/test_supervisor_registry.py \
            tests/hermes_cli/test_supervisor_tool_catalog.py \
            tests/run_agent/test_opencode_zen_anonymous_free.py \
            tests/scripts/test_market_memory.py \
            tests/test_application_services.py
      - name: Standalone Timeline MCP regression
        env:
          TIMELINE_CODE_MAP_DB_PATH: ${{ runner.temp }}/timeline-smoke.db
        run: |
          "$RUNNER_TEMP/hermes-control/current/venv/bin/python" - <<'PY'
          import asyncio
          import os
          import sys
          from mcp import ClientSession, StdioServerParameters
          from mcp.client.stdio import stdio_client

          async def main():
              params = StdioServerParameters(
                  command=sys.executable,
                  args=["-m", "hermes_timeline_code_map.mcp_server"],
                  env={
                      **os.environ,
                      "TIMELINE_CODE_MAP_DB_PATH": os.environ["TIMELINE_CODE_MAP_DB_PATH"],
                  },
              )
              async with stdio_client(params) as (read, write):
                  async with ClientSession(read, write) as session:
                      await session.initialize()
                      tools = {tool.name for tool in (await session.list_tools()).tools}
                      required = {
                          "get_context_tool",
                          "record_node",
                          "query_code_slice_tool",
                          "verify_all_tool",
                      }
                      assert required <= tools, sorted(tools)

          asyncio.run(main())
          PY
      - name: Full upstream regression
        working-directory: ${{ runner.temp }}/hermes-control/current/source
        run: ./scripts/run_tests.sh -j 4
